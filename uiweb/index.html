<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      !function(){try{var k='uiweb.theme.mode',m=localStorage.getItem(k)||'system';
      if(!/^(system|light|dark)$/.test(m))m='system';
      var d=m==='dark'||(m==='system'&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
      document.documentElement.dataset.theme=d;
      document.documentElement.dataset.themeMode=m;
      document.documentElement.style.colorScheme=d;}catch(e){}}();
    </script>
    <script>
      !function(){var n=4,k='_fav_idx',s=sessionStorage,i=s.getItem(k);
      if(!i){i=Math.floor(Math.random()*n)+1;s.setItem(k,i)}
      document.getElementById('favicon').href='/favicon-'+i+'.png';
    }();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Youkies API · Clay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
